kind = "web"
previewPath = "/"
title = "Rais Honda POS & Workshop"
version = "1.0.0"
id = "artifacts/honda-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23813

[services.development]
run = "pnpm --filter @workspace/honda-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/honda-pos", "run", "build" ]
publicDir = "artifacts/honda-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23813"
BASE_PATH = "/"
